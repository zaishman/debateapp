<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>debateapp</title>
    

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://googleapis.com">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="dividerContainer">
        <div id="timerSection">
            <div id="headerContainer1">
             <p id="debate">Debate</p>
            </div>
            <div id="content1">
            <div id="mainTextArea">
            <h1 id="promptArea">prompt will show up here</h1>
            <p id="standingArea">standing will show up here</p>
            </div>
            <div id="timerArea">
            <button id="increaseTime" style="background-image: url('arrowOne.png'); width: 30px; height: 30px; background-size: contain; background-position: center; background-color: transparent; border: none;"></button>
            <p id="timer" style="font-size: 50px;">05:00</p>
            <button id="decreaseTime" style="background-image: url('arrowTwo.png'); width: 30px; height: 30px; background-size: contain; background-position: center; background-color: transparent; border: none;"></button>
            </div>
            <div id="controlButtons">
                <button id="shuffleButton" type="button">shuffle</button>
                <button id="playButton" type="button">play</button>
            </div>
            </div>
        </div>

        <div id="noteSection">
            <div id="headerContainer2">
                <p id="notesHeading">Notes</p>
            </div>
            <div id="content2">
                <p>Sources</p>
                <button id="toggleSources" type="button">view sources</button>
                <ul id="sourceList"></ul>

                <p>Notes</p>
                <textarea id="labelNotes" placeholder="Label here..."></textarea>
                <textarea id="writeNotes" placeholder="Write here..."></textarea>
                <div id="menuBar">
                <button id="saveNote" type="button">Save</button>
                <button id="viewAll" type="button">View All</button>
                <select id="savedNotes">
                    <option>Saved Notes</option>
                </select>
                <button id="deleteNote" type="button"> X </button>
                </div>
                <div id="allNotes"></div>
                <div id="noteDisplay">
                <p id="label"></p>
                <p id="content"></p>
                </div>
        </div>
        </div>
    </div>

</body>
</html>
